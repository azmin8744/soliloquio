input AddPostInput {
	title: String!
	content: String!
	isPublished: Boolean
	description: String
	slug: String
}

type ApiKeyInfo {
	id: UUID!
	label: String!
	lastUsedAt: NaiveDateTime
	createdAt: NaiveDateTime!
}

type Asset {
	id: UUID!
	originalFilename: String!
	mimeType: String!
	sizeBytes: Int!
	createdAt: NaiveDateTime!
	urls: AssetUrls!
}

type AssetConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [AssetEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [Asset!]!
}

"""
An edge in a connection.
"""
type AssetEdge {
	"""
	The item at the end of the edge
	"""
	node: Asset!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

union AssetMutationResult = DeletedAsset | DbError | AuthError

type AssetUrls {
	thumbnail: String!
	small: String!
	medium: String!
	large: String!
	original: String!
}

type AuthError {
	message: String!
}

type AuthorizedUser {
	token: String!
	refreshToken: String!
}


input ChangePasswordInput {
	currentPassword: String!
	newPassword: String!
}

union ChangePasswordResult = PasswordChangeSuccess | ValidationErrorType | AuthError | DbError

union CreateApiKeyMutationResult = CreateApiKeyResult | AuthError | DbError

type CreateApiKeyResult {
	id: UUID!
	label: String!
	rawKey: String!
}

type DbError {
	message: String!
}

input DeletePostInput {
	id: UUID!
}

type DeletedAsset {
	id: UUID!
}

type DeletedPost {
	id: UUID!
}

type EmailVerifySuccess {
	message: String!
}


union ForgotPasswordResult = PasswordResetSuccess | DbError



type Mutations {
	addPost(newPost: AddPostInput!): PostMutationResult!
	updatePost(post: UpdatePostInput!): PostMutationResult!
	deletePost(post: DeletePostInput!): PostMutationResult!
	signUp(input: SignUpInput!): SignUpResult!
	signIn(input: SignInInput!): SignInResult!
	refreshAccessToken(refreshToken: String!): RefreshAccessTokenResult!
	logout(refreshToken: String!): Boolean!
	logoutAllDevices(accessToken: String!): Boolean!
	changePassword(input: ChangePasswordInput!): ChangePasswordResult!
	forgotPassword(email: String!): ForgotPasswordResult!
	resetPassword(token: String!, newPassword: String!): ResetPasswordResult!
	verifyEmail(token: String!): VerifyEmailResult!
	resendVerificationEmail: ResendVerificationEmailResult!
	updateUser(input: UpdateUserInput!): UpdateUserResult!
	createApiKey(label: String!): CreateApiKeyMutationResult!
	revokeApiKey(id: UUID!): RevokeApiKeyMutationResult!
	deleteAsset(id: UUID!): AssetMutationResult!
}

"""
ISO 8601 combined date and time without timezone.

# Examples

* `2015-07-01T08:59:60.123`,
"""
scalar NaiveDateTime

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
	When paginating backwards, are there more items?
	"""
	hasPreviousPage: Boolean!
	"""
	When paginating forwards, are there more items?
	"""
	hasNextPage: Boolean!
	"""
	When paginating backwards, the cursor to continue.
	"""
	startCursor: String
	"""
	When paginating forwards, the cursor to continue.
	"""
	endCursor: String
}

type PasswordChangeSuccess {
	message: String!
}

type PasswordResetSuccess {
	message: String!
}

type Post {
	id: UUID!
	title: String!
	isPublished: Boolean!
	firstPublishedAt: NaiveDateTime
	createdAt: NaiveDateTime!
	updatedAt: NaiveDateTime!
	description: String
	slug: String
	"""
	Returns the original markdown content for editing
	"""
	markdownContent: String!
	"""
	Returns the rendered HTML content for display
	"""
	content: String!
}

type PostConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [PostEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [Post!]!
}

"""
An edge in a connection.
"""
type PostEdge {
	"""
	The item at the end of the edge
	"""
	node: Post!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

union PostMutationResult = Post | DeletedPost | DbError | AuthError

enum PostSortBy {
	CREATED_AT
	UPDATED_AT
	TITLE
}

type Queries {
	"""
	Get the currently authenticated user's profile
	"""
	me: User
	apiKeys: [ApiKeyInfo!]!
	"""
	Get paginated posts for the authenticated user
	"""
	posts(after: String, first: Int, sortBy: PostSortBy, sortDirection: SortDirection, search: String): PostConnection!
	"""
	Get a specific post by ID for the authenticated user
	"""
	post(id: UUID!): Post
	assets(after: String, first: Int): AssetConnection!
}

union RefreshAccessTokenResult = AuthorizedUser | AuthError

union ResendVerificationEmailResult = EmailVerifySuccess | AuthError

union ResetPasswordResult = PasswordChangeSuccess | AuthError | DbError

union RevokeApiKeyMutationResult = RevokeApiKeyResult | AuthError | DbError

type RevokeApiKeyResult {
	id: UUID!
}

input SignInInput {
	email: String!
	password: String!
}

union SignInResult = AuthorizedUser | ValidationErrorType | AuthError | DbError

input SignUpInput {
	email: String!
	password: String!
}

union SignUpResult = AuthorizedUser | ValidationErrorType | AuthError | DbError

enum SortDirection {
	ASC
	DESC
}


type Subscriptions {
	values: Int!
}

"""
A UUID is a unique 128-bit number, stored as 16 octets. UUIDs are parsed as
Strings within GraphQL. UUIDs are used to assign unique identifiers to
entities without requiring a central allocating authority.

# References

* [Wikipedia: Universally Unique Identifier](http://en.wikipedia.org/wiki/Universally_unique_identifier)
* [RFC4122: A Universally Unique IDentifier (UUID) URN Namespace](http://tools.ietf.org/html/rfc4122)
"""
scalar UUID

input UpdatePostInput {
	id: UUID!
	title: String!
	content: String!
	isPublished: Boolean
	description: String
	slug: String
}

input UpdateUserInput {
	email: String!
	displayName: String
	bio: String
}

union UpdateUserResult = User | ValidationErrorType | AuthError | DbError

type User {
	id: UUID!
	email: String!
	emailVerifiedAt: NaiveDateTime
	displayName: String
	bio: String
	createdAt: NaiveDateTime
	updatedAt: NaiveDateTime
}

type ValidationErrorType {
	message: String!
}

union VerifyEmailResult = EmailVerifySuccess | AuthError | DbError

directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
directive @specifiedBy(url: String!) on SCALAR
schema {
	query: Queries
	mutation: Mutations
	subscription: Subscriptions
}
