services:
  database:
    image: paradedb/paradedb:0.22.5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-soliloquio}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TOKEN_SECRET: ${TOKEN_SECRET}
      TOKEN_EXPIRATION_SECONDS: ${TOKEN_EXPIRATION_SECONDS:-3600}
      REFRESH_TOKEN_EXPIRATION_DAYS: ${REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      HOST_NAME: ${HOST_NAME}
      BIND_ADDR: 0.0.0.0:8000
      SECURE_COOKIES: "true"
      LOG_FORMAT: json
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      PUBLIC_CORS_ORIGINS: ${PUBLIC_CORS_ORIGINS:-*}
      SINGLE_USER_MODE: ${SINGLE_USER_MODE:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-}

  frontend:
    build: ./client
    ports:
      - "${FRONTEND_PORT:-3000}:8000"
    environment:
      GRAPHQL_ENDPOINT: http://backend:8000/
      BACKEND_BASE: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
